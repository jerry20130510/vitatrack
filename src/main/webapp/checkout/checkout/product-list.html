<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>商品清單</title>
</head>
<body>

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>商品清單</h2>
    <button id="btnOpenAdd" type="button">新增商品</button>
  </div>

  <table border="1" id="productTable">
    <thead>
      <tr>
        <th>商品編號（SKU）</th>
        <th>商品名稱</th>
        <th>價格</th>
        <th>規格/尺寸</th>
        <th>庫存</th>
        <th>商品詳細內容</th>
        <th>商品簡介</th>
        <th>狀態</th>
        <th>建立者管理員ID</th>
        <th>最後更新者管理員ID</th>
        <th>編輯</th>
      </tr>
    </thead>
    <tbody id="productTbody">
      <!-- JS 塞資料 -->
    </tbody>
  </table>

  <!-- 編輯彈窗（用 div + display 控制；不加 CSS 檔） -->
  <div id="editModal" style="display:none; position:fixed; left:0; top:0; right:0; bottom:0; background:rgba(0,0,0,0.25);">
    <div style="background:#fff; margin:40px auto; padding:12px; width:90%; max-width:720px; overflow:auto; max-height:85vh;">
      <h3>編輯商品</h3>

      <div>
        <label>SKU（不可改）</label><br>
        <input id="mSku" readonly>
      </div>

      <div>
        <label>狀態</label><br>
        <select id="mStatus">
          <option value="ON_SALE">上架</option>
          <option value="OFF_SALE">下架</option>
        </select>
      </div>

      <div>
        <label>建立者管理員ID（不可改）</label><br>
        <input id="mCreatedBy" readonly>
      </div>

      <div>
        <label>最後更新者管理員ID（不可改）</label><br>
        <input id="mUpdatedBy" readonly>
      </div>

      <hr>

      <div>
        <label>商品名稱</label><br>
        <input id="mProductName">
      </div>

      <div>
        <label>價格</label><br>
        <input id="mPrice" type="number" step="0.01">
      </div>

      <div>
        <label>規格/尺寸</label><br>
        <input id="mSize">
      </div>

      <div>
        <label>庫存</label><br>
        <input id="mStock" type="number" step="1">
      </div>

      <div>
        <label>商品詳細內容</label><br>
        <textarea id="mDescription" rows="4" style="width:100%;"></textarea>
      </div>

      <div>
        <label>商品簡介</label><br>
        <textarea id="mShortDescription" rows="3" style="width:100%;"></textarea>
      </div>

      <div style="margin-top:10px;">
        <button id="btnSaveEdit" type="button">儲存</button>
        <button id="btnCloseEdit" type="button">取消</button>
      </div>
    </div>
  </div>

  <!-- 新增彈窗：不寫 CSS 檔，直接用 dialog 內建樣式 -->
  <dialog id="addDialog">
    <h3>新增商品</h3>

    <div>
      <label>SKU（系統自動產生）</label><br>
      <input id="aSku" placeholder="系統自動產生" disabled>
    </div>

    <div>
      <label>分類ID（categoryId）</label><br>
      <input id="aCategoryId" type="number" step="1">
    </div>

    <div>
      <label>商品名稱</label><br>
      <input id="aProductName">
    </div>

    <div>
      <label>價格</label><br>
      <input id="aPrice" type="number" step="0.01">
    </div>

    <div>
      <label>規格/尺寸</label><br>
      <input id="aSize">
    </div>

    <div>
      <label>庫存</label><br>
      <input id="aStock" type="number" step="1">
    </div>

    <div>
      <label>狀態</label><br>
      <select id="aStatus">
        <option value="ON_SALE">上架</option>
        <option value="OFF_SALE">下架</option>
      </select>
    </div>

    <div>
      <label>商品詳細內容</label><br>
      <textarea id="aDescription" rows="4" style="width:100%;"></textarea>
    </div>

    <div>
      <label>商品簡介</label><br>
      <textarea id="aShortDescription" rows="3" style="width:100%;"></textarea>
    </div>

    <div style="margin-top:10px;">
      <button id="btnSaveAdd" type="button">新增</button>
      <button id="btnCloseAdd" type="button">取消</button>
    </div>
  </dialog>

  <script src="product/js/product-list.js"></script>
</body>
</html>
