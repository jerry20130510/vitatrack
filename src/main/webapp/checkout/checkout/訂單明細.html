<!DOCTYPE html>
<html lang="zh-TW" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>後台 - 訂單明細</title>

    <!-- App favicon -->
    <link rel="shortcut icon" href="assets/img/favicon/favicon.png">

    <!-- Icon CSS -->
    <link href="assets/css/vendor/materialdesignicons.min.css" rel="stylesheet">
    <link href="assets/css/vendor/remixicon.css" rel="stylesheet">

    <!-- Vendor -->
    <link href="assets/css/vendor/bootstrap.min.css" rel="stylesheet">

    <!-- Main CSS -->
    <link id="mainCss" href="assets/css/style.css" rel="stylesheet">

    <style>
        /* 後台小幅客製化，使版面接近期望的線框樣式 */
        body { background: #fff; color: #222; }
        .admin-wrapper { display: flex; min-height: 80vh; }
        .admin-sidebar {
            width: 220px;
            border-right: 1px dashed #cfcfcf;
            padding: 24px;
            background: #fafafa;
            box-sizing: border-box;
        }
        .admin-sidebar h3 { font-size: 16px; margin-bottom: 12px; }
        .admin-sidebar ul { padding-left: 16px; margin:0; }
        .admin-sidebar li { margin: 8px 0; list-style: none; }
        .admin-sidebar a { color: #333; text-decoration: none; }
        .admin-sidebar a.fw-bold { font-weight: 700; }
        .admin-content { flex: 1; padding: 24px; box-sizing: border-box; background: #fff; }
        .page-title { margin-bottom: 18px; display:flex; justify-content:space-between; align-items:center; }
        .info-box {
            border: 1px solid #ccc;
            padding: 18px;
            border-radius: 4px;
            background: #fff;
            margin-bottom: 20px;
        }
        .info-box .info-line { margin:6px 0; color:#333; }
        .items-table { border-collapse: separate; border-spacing: 0 12px; width:100%; }
        .items-table thead th { background: transparent; padding:10px 12px; text-align:left; border-bottom: 2px solid #eee; color:#333; font-weight:600; }
        .items-table tbody tr {
            background: #fff;
            border: 1px dashed #cfcfcf;
            border-radius: 4px;
        }
        .items-table tbody td { padding: 12px; vertical-align: middle; }
        .items-table tbody tr td:first-child { padding-left: 18px; }
        .items-table .qty, .items-table .price, .items-table .sub { text-align: center; }
        .back-btn { margin-left: 8px; }
        .muted { color:#666; font-size: 0.95rem; }
        @media (max-width: 767px) {
            .admin-wrapper { flex-direction: column; }
            .admin-sidebar { width:100%; border-right: none; border-bottom:1px dashed #cfcfcf; }
            .admin-content { padding-top: 12px; }
            .items-table thead { display: none; }
            .items-table tbody tr { display: block; padding: 12px; }
            .items-table tbody td { display: block; text-align: left; padding: 6px 0; }
            .items-table tbody td .label { color:#666; margin-right:6px; }
            .items-table tbody td .value { font-weight:600; }
        }
    </style>
</head>

<body>

    <main class="wrapper sb-default">

        <header class="p-3 border-bottom">
            <div class="container-fluid">
                <div class="d-flex align-items-center">
                    <div class="me-auto">
                        <a href="index.html" class="logo"><img src="assets/img/logo/logo.png" alt="logo" style="height:36px;"></a>
                    </div>
                    <div>
                        <span>管理後台</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="admin-wrapper container-fluid">
            <!-- 左側後台選單 -->
            <aside class="admin-sidebar">
                <h3>後台選單</h3>
                <ul>
                    <li><a href="#" class="fw-bold">訂單處理</a></li>
                    <li><a href="#">商品管理</a></li>
                    <li><a href="#">會員管理</a></li>
                    <li><a href="#">報表</a></li>
                </ul>
            </aside>

            <!-- 右側主要內容：訂單明細 -->
            <section class="admin-content">
                <div class="page-title">
                    <h2 class="mb-0">訂單明細</h2>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary" onclick="history.back()">返回列表</button>
                    </div>
                </div>

                <!-- 訂單資訊區塊 -->
                <div class="info-box">
                    <div class="info-line"><strong>訂單編號：</strong> ODR001</div>
                    <div class="info-line"><strong>會員ID：</strong> XXXX</div>
                    <div class="info-line"><strong>收件人：</strong> 王小明</div>
                    <div class="info-line"><strong>地址：</strong> 台北市大安區XX路</div>
                    <div class="info-line"><strong>付款方式：</strong> 信用卡</div>
                </div>

                <!-- 商品清單（桌機：使用表格；手機：卡片式） -->
                <div class="table-responsive">
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th style="width:50%;">商品</th>
                                <th style="width:15%;" class="qty">數量</th>
                                <th style="width:15%;" class="price">單價</th>
                                <th style="width:20%;" class="sub">小計</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="assets/img/product/product-1.jpg" alt="商品1" style="width:60px;height:60px;object-fit:cover;border-radius:4px;margin-right:12px;">
                                        <div>
                                            <div>商品1</div>
                                            <div class="muted small">規格 / 顏色：黑 / M</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="qty">1</td>
                                <td class="price">$500</td>
                                <td class="sub">$500</td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="assets/img/product/product-2.jpg" alt="商品2" style="width:60px;height:60px;object-fit:cover;border-radius:4px;margin-right:12px;">
                                        <div>
                                            <div>商品2</div>
                                            <div class="muted small">規格 / 顏色：白 / L</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="qty">1</td>
                                <td class="price">$500</td>
                                <td class="sub">$500</td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="assets/img/product/product-3.jpg" alt="商品3" style="width:60px;height:60px;object-fit:cover;border-radius:4px;margin-right:12px;">
                                        <div>
                                            <div>商品3</div>
                                            <div class="muted small">規格 / 顏色：藍 / S</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="qty">1</td>
                                <td class="price">$500</td>
                                <td class="sub">$500</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 底部小計（可擴充為右側 summary） -->
                <div class="d-flex justify-content-end mt-3">
                    <div class="text-end">
                        <div>小計：<strong>$1500</strong></div>
                        <div class="mt-2">
                            <button id="markShippedBtn" class="btn btn-sm btn-primary">標記已出貨</button>
                            <button class="btn btn-sm btn-outline-secondary back-btn" onclick="history.back()">返回</button>
                        </div>
                    </div>
                </div>

            </section>
        </div>

        <footer class="p-3 border-top text-center">
            <small>© <span id="copyright_year"></span> The Mantu</small>
        </footer>

    </main>

    <!-- Vendor JS -->
    <script src="assets/js/vendor/jquery-3.7.1.min.js"></script>
    <script src="assets/js/vendor/bootstrap.bundle.min.js"></script>

    <!-- Main JS -->
    <script src="assets/js/main.js"></script>

    <script>
        // 設定 footer 年份
        document.getElementById('copyright_year').textContent = new Date().getFullYear();

        // 範例：標記已出貨（目前為前端示範，需接後端 API 才能生效）
        document.getElementById('markShippedBtn').addEventListener('click', function () {
            if (!confirm('確定要將此訂單標記為「已出貨」嗎？')) return;

            // 示範 AJAX（需要後端 endpoint 才會真的生效）
            // 範例：
            // $.post('/api/orders/ODR001/ship', { tracking: '' })
            //  .done(function(res){ alert('已標記出貨'); })
            //  .fail(function(){ alert('發生錯誤'); });

            // 目前以前端提示替代
            alert('（示範）已標記為「已出貨」 — 若接後端，會在此送出請求。');
            // 可在此更新 UI，例如把按鈕改為 disabled 或顯示狀態
            this.disabled = true;
            this.textContent = '已出貨';
        });
    </script>
</body>

</html>
