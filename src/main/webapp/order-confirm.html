<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>訂單已確認</title>

<style>
body {
	font-family: Arial, "Microsoft JhengHei", sans-serif;
	margin: 0;
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background-color: #f5f5f5;
}

.container {
	width: 100%;
	display: flex;
	flex-direction: column;
	align-items: center;
	padding: 24px;
	box-sizing: border-box;
}

h2 {
	font-size: 42px;
	margin: 0 0 28px 0;
	font-weight: 700;
}

.card {
	width: 90%;
	max-width: 760px;
	background-color: #fff;
	border: 1px solid #ddd;
	border-radius: 16px;
	padding: 36px 40px;
	box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
	box-sizing: border-box;
}

.row {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin: 18px 0;
	font-size: 24px;
}

.label {
	color: #666;
	font-size: 24px;
}

.value {
	font-weight: 700;
	font-size: 28px;
	color: #111;
}

hr {
	margin: 28px 0;
	border: none;
	border-top: 1px solid #e5e5e5;
}

.pay-row {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-top: 8px;
}

.pay-label {
	color: #666;
	font-size: 24px;
}

.pay {
	font-size: 32px;
	font-weight: 700;
	color: #b56b00;
}

.error {
	color: #b00020;
}

@media (max-width: 768px) {
	h2 {
		font-size: 34px;
	}

	.card {
		width: 95%;
		padding: 28px 24px;
	}

	.row,
	.label,
	.pay-label {
		font-size: 20px;
	}

	.value {
		font-size: 24px;
	}

	.pay {
		font-size: 26px;
	}
}

@media (max-width: 480px) {
	.row,
	.pay-row {
		flex-direction: column;
		align-items: flex-start;
		gap: 8px;
	}

	.value,
	.pay {
		font-size: 24px;
	}
}
</style>
</head>

<body>
	<div class="container">
		<h2>訂單已確認</h2>

		<div class="card">
			<div class="row">
				<div class="label">訂單編號</div>
				<div class="value" id="orderId">-</div>
			</div>

			<div class="row">
				<div class="label">訂單金額</div>
				<div class="value" id="totalAmount">-</div>
			</div>

			<div class="row">
				<div class="label">訂單狀態</div>
				<div class="value" id="status">-</div>
			</div>

			<hr>

			<div class="pay-row">
				<div class="pay-label">付款流程</div>
				<div class="pay" id="payFlowMsg">確認中...</div>
			</div>
		</div>
	</div>

	<script>
		const qs = new URLSearchParams(location.search);
		const orderId = qs.get('orderId') || '';
		const totalAmount = qs.get('totalAmount') || '';
		const status = qs.get('status') || '';

		document.getElementById('orderId').textContent = orderId || '-';
		document.getElementById('totalAmount').textContent = totalAmount || '-';
		document.getElementById('status').textContent = status || '-';

		const payFlowMsgEl = document.getElementById('payFlowMsg');

		function getContextPath() {
			const parts = window.location.pathname.split('/').filter(Boolean);
			return parts.length > 0 ? '/' + parts[0] : '';
		}

		const CONTEXT_PATH = getContextPath();
		const PAYMENT_API = `${CONTEXT_PATH}/api/checkout/payment`;

		function showError() {
			payFlowMsgEl.textContent = '付款失敗，請諮詢客服';
			payFlowMsgEl.classList.add('error');
		}

		async function callPaymentApi() {
			if (!orderId) {
				showError();
				return;
			}

			payFlowMsgEl.textContent = '確認中...';
			payFlowMsgEl.classList.remove('error');

			try {
				const body = `orderId=${encodeURIComponent(orderId)}`;

				const res = await fetch(PAYMENT_API, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
						'Accept': 'application/json'
					},
					body
				});

				const bodyText = await res.text();

				if (res.status === 200) {
					let payload = null;

					try {
						payload = JSON.parse(bodyText);
					} catch (e) {
						payload = null;
					}

					if (payload && payload.actionUrl && payload.formParams) {
						const form = document.createElement('form');
						form.method = 'POST';
						form.action = payload.actionUrl;
						form.style.display = 'none';

						Object.entries(payload.formParams).forEach(([k, v]) => {
							const input = document.createElement('input');
							input.type = 'hidden';
							input.name = k;
							input.value = v ?? '';
							form.appendChild(input);
						});

						document.body.appendChild(form);
						form.submit();
						return;
					}
				}

				showError();

			} catch (e) {
				console.error('Call payment API failed:', e);
				showError();
			}
		}

		window.addEventListener('load', callPaymentApi);
	</script>
</body>
</html>
