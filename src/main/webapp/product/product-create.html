<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>新增商品</title>
  <link rel="stylesheet" href="./css/product-create.css" />
</head>
<body>
  <main class="container">
    <h1>新增商品</h1>

    <form id="productForm" class="card">
      <div class="grid">
        <label class="field">
          <span>SKU（必填）</span>
          <input name="sku" type="text" placeholder="VITA-C-001" required />
        </label>

        <label class="field">
          <span>分類 ID（必填，需存在於 category）</span>
          <input name="categoryId" type="number" min="1" step="1" required />
        </label>

        <label class="field grid-span-2">
          <span>商品名稱（必填）</span>
          <input name="productName" type="text" placeholder="維他命C 1000mg" required />
        </label>

        <label class="field">
          <span>規格 / 容量</span>
          <input name="size" type="text" placeholder="60顆" />
        </label>

        <label class="field">
          <span>價格（必填）</span>
          <input name="price" type="number" min="0" step="1" required />
        </label>

        <label class="field">
          <span>庫存（必填）</span>
          <input name="stockQuantity" type="number" min="0" step="1" required />
        </label>

        <label class="field">
          <span>狀態</span>
          <input name="status" type="text" placeholder=" 1=ON / 0=OFF " />
        </label>

        <label class="field grid-span-2">
          <span>短描述</span>
          <input name="shortDescription" type="text" placeholder="日常補充" />
        </label>

        <label class="field grid-span-2">
          <span>完整描述</span>
          <textarea name="description" rows="4" placeholder="建議每日1顆，飯後食用。"></textarea>
        </label>
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit">送出新增</button>
        <button type="button" id="fillDemoBtn" class="secondary">填入範例</button>
      </div>

      <section class="result">
        <div class="hint">
          提醒：categoryId 必須在 category 表存在；status 必須符合資料表 enum 值。
        </div>
        <pre id="resultBox" aria-live="polite"></pre>
      </section>
    </form>
  </main>

  <script src="./js/product-create.js"></script>
</body>
</html>
