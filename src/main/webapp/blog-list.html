    <script>
      document.querySelector(".loader")?.remove();
      document.querySelector("#mn-overlay")?.remove();
      document.querySelectorAll("header, .mn-main-content").forEach(el => el.classList.add("sb-hide"));
      // Mobile menu toggle
      document.querySelector('.mn-toggle-menu')?.addEventListener('click', () => {
        document.querySelector('.mn-mobile-menu-overlay')?.style.setProperty('display', 'block');
        document.querySelector('.mn-mobile-menu')?.classList.add('mn-menu-open');
      });
      document.querySelectorAll('.mn-mobile-menu-overlay, .mn-close-menu').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelector('.mn-mobile-menu-overlay')?.style.setProperty('display', 'none');
          document.querySelector('.mn-mobile-menu')?.classList.remove('mn-menu-open');
        });
      });
    </script>
