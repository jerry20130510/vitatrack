<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>商品新增</title>
		<link rel="stylesheet" href="./product/css/product-add.css">
	</head>
	<body>
		<div id="productForm">
			<h2>商品新增</h2>

			<div>
				<label>商品名稱：</label>
				<input type="text" id="productName"><br><br>

				<label>價格：</label>
				<input type="text" id="price"><br><br>

				<label>商品顆數：</label>
				<input type="text" id="size"><br><br>

				<label>商品數量：</label>
				<input type="text" id="stockQuantity"><br><br>			

				<label>商品描述：</label>
				<input type="text" id="description"><br><br>

				<label>商品簡述：</label>
				<input type="text" id="shortDescription"><br><br>

				<label>商品狀態：</label>
				<input type="text" id="status"><br><br>
				
				<button id="submitBtn">送出</button>	
			</div>
		</div>		
		
		<script src="./product/js/product-add.js"></script>
	</body>
</html>
